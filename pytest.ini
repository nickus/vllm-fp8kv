[pytest]
# The suite runs on CPU: Triton kernels execute under TRITON_INTERPRET (see
# tests/conftest.py), so kernel MATH is verified in CI. Only throughput, the
# bf16 dtype and the 3.5M-slot pool need a GPU; those tests skip without one.
#
# Coverage floor is enforced, not merely reported (--cov-fail-under). GPU-only
# code (event timing, the bf16 baseline) is marked `# pragma: no cover` at the
# function level with a stated reason, never omitted wholesale.
testpaths = tests
addopts =
    --cov=vllm_fp8kv
    --cov=verify
    --cov=patches
    --cov-report=term-missing
    --cov-fail-under=80
filterwarnings =
    ignore::DeprecationWarning
